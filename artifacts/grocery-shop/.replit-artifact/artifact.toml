kind = "web"
previewPath = "/"
title = "Fresh Market — Grocery Shop"
version = "1.0.0"
id = "artifacts/grocery-shop"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22219

[services.development]
run = "pnpm --filter @workspace/grocery-shop run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/grocery-shop", "run", "build" ]
publicDir = "artifacts/grocery-shop/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22219"
BASE_PATH = "/"
